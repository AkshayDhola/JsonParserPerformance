name: .NET CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore -warnaserror

      # Run ONLY unit tests project (skip benchmark)
      - name: Run unit tests
        run: dotnet test JsonParserPerformance.UnitTests/JsonParserPerformance.UnitTests.csproj --configuration Release --no-build --verbosity normal