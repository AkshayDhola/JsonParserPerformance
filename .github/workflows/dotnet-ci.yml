name: .NET CI + CodeQL

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-test-codeql:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Cache NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Initialize CodeQL (no manual mode)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      # Autobuild (critical for correct CodeQL analysis)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Run ONLY unit tests project (skip benchmark)
      - name: Run unit tests
        run: dotnet test JsonParserPerformance.UnitTests/JsonParserPerformance.UnitTests.csproj --configuration Release --no-build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3